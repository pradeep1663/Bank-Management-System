<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 450px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        .menu a {
            display: block;
            padding: 12px;
            margin: 12px 0;
            background: #007bff;
            color: white;
            text-decoration: none;
            text-align: center;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.3s;
        }

        .menu a:hover {
            background: #0056b3;
        }

        .logout {
            background: #dc3545 !important;
        }

        .logout:hover {
            background: #b02a37 !important;
        }

    </style>

</head>

<body>

    <div class="container">

        <h2>Admin Dashboard</h2>

        <div class="menu">

            <a href="/users/">View All Users</a>

            <a href="/requests/">View Requests</a>

            <a href="/search_user/">Search User</a>

            <a href="/logout/" class="logout">Logout</a>

        </div>

    </div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>All Users</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 900px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #007bff;
            color: white;
            padding: 12px;
        }

        td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f8f9fa;
        }

        tr:hover {
            background: #e9ecef;
        }

        .delete-btn {
            padding: 8px 14px;
            background: #dc3545;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .delete-btn:hover {
            background: #b02a37;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 18px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .back-btn:hover {
            background: #218838;
        }

    </style>

</head>

<body>

    <div class="container">

        <h2>All Users</h2>

        <table>

            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Role</th>
                <th>Action</th>
            </tr>

            {% for user in users %}
            <tr>

                <td>{{ user.user_id }}</td>

                <td>{{ user.user_name }}</td>

                <td>{{ user.user_role }}</td>

                <td>
                    {% if user.user_role == 'customer' %}
                        <a href="/delete/{{ user.user_id }}/"
                           class="delete-btn">
                           Delete
                        </a>
                    {% else %}
                        -
                    {% endif %}
                </td>

            </tr>
            {% endfor %}

        </table>

        <a href="/dashboard/" class="back-btn">
            Back to Dashboard
        </a>

    </div>

</body>
</html>

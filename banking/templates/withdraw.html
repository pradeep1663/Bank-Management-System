<!DOCTYPE html>
<html>
<head>
    <title>Withdraw Money</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 450px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        .balance {
            background: #fff3cd;
            border-left: 5px solid #ffc107;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-weight: bold;
            color: #856404;
        }

        .error {
            color: red;
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #fd7e14;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #e76b00;
        }

        .back-btn {
            display: block;
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .back-btn:hover {
            background: #0056b3;
        }

    </style>

</head>

<body>

    <div class="container">

        <h2>Withdraw Money</h2>

        <div class="balance">
            Available Balance: ₹{{ account.account_balance }}
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="error">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">

            {% csrf_token %}

            <label>Withdrawal Amount</label>

            <input
                type="number"
                name="amount"
                placeholder="Enter amount"
                step="0.01"
                required
            >

            <button type="submit">
                Withdraw Money
            </button>

        </form>

        <a href="/dashboard/" class="back-btn">
            Back to Dashboard
        </a>

    </div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #007bff, #00c6ff);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 420px;
            margin: 80px auto;
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        .error {
            color: red;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }

        label {
            font-weight: bold;
            color: #333;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 18px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .signup-link {
            text-align: center;
            margin-top: 20px;
        }

        .signup-link a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .bank-icon {
            text-align: center;
            font-size: 50px;
            margin-bottom: 10px;
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="bank-icon">
            🔐
        </div>

        <h2>Login</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="error">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">

            {% csrf_token %}

            <label>Username</label>
            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required
            >

            <label>Password</label>
            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required
            >

            <label>Select Role</label>
            <select name="role" required>
                <option value="">Select Role</option>
                <option value="admin">Admin</option>
                <option value="customer">Customer</option>
            </select>

            <button type="submit">
                Login
            </button>

        </form>

        <div class="signup-link">
            Don't have an account?
            <a href="/signup/">Sign Up</a>
        </div>

    </div>

</body>
</html>

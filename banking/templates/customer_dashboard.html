<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; }
        .balance { background: lightblue; padding: 20px; margin: 20px 0; }
        .menu a { display: block; padding: 10px; margin: 5px; background: green; color: white; text-decoration: none; }
    </style>
</head>
<body>
    <h2>Customer Dashboard</h2>
    
    {% if messages %}
        {% for message in messages %}
            <p style="color: green;">{{ message }}</p>
        {% endfor %}
    {% endif %}
    
    <div class="balance">
        <h3>Balance: ₹{{ account.account_balance }}</h3>
        <p>Account Type: {{ account.account_type }}</p>
    </div>
    
    <div class="menu">
        <a href="/balance/">Check Balance</a>
        <a href="/deposit/">Deposit Money</a>
        <a href="/withdraw/">Withdraw Money</a>
        <a href="/request/">Submit Request</a>
        <a href="/view_responses/">View Responses</a>
        <a href="/logout/">Logout</a>
    </div>
</body>
</html>
